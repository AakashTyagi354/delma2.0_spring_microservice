



server:
  port: 8016

spring:
  application:
    name: productservice
  datasource:
    url: jdbc:postgresql://localhost:5432/product_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  security:
    user:
      name: admin
      password: admin123

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

aws:
  s3:
    bucket:
      name:  delma-ecom-product-images
    access:
      key:  ${AWS_ACCESS_KEY_ID}
    secret:
      key:  ${AWS_SECRET_ACCESS_KEY}
    region: eu-north-1


