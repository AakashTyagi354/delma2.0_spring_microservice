server:
  port: 8089

spring:
  main:
    web-application-type: reactive
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
          routes:
            - id: userservice
              uri: lb://userservice
              predicates:
                - Path=/api/v1/admin/**,/auth/**,/api/users/**
            - id: doctorservice
              uri: lb://doctorservice
              predicates:
                - Path=/api/v1/doctor/**
            - id: appointmentservice
              uri: lb://appointmentservice
              predicates:
                - Path=/api/v1/slots/**,/api/v1/appointments/**
            - id: categoryservice
              uri: lb://categoryservice
              predicates:
                - Path=/api/v1/category/**
            - id: productservice
              uri: lb://productservice
              predicates:
                - Path=/api/v1/product/**
            - id: notificationservice
              uri: lb://notificationservice
              predicates:
                - Path=/api/v1/notifications/**
            - id: documentservice
              uri: lb://documentservice
              predicates:
                - Path=/api/v1/documents/**
            - id: orderservice
              uri: lb://orderservice
              predicates:
                - Path=/api/v1/orders/**
            - id: paymentservice
              uri: lb://paymentservice
              predicates:
                - Path=/api/v1/payments/**
            - id: aiservice
              uri: lb://aiservice
              predicates:
                - Path=/api/v1/ai/**


# Eureka client config for gateway
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true


management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

jwt:
  secret: Z0ZqQm1nQ0tZQ1N2R3p3VjVnQ0hFZ3pMZ1R2aD...

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
