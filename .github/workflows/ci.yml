name: Delma CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push discovery-server
        uses: docker/build-push-action@v5
        with:
          context: ./discovery-server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-discovery-server:latest

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-gateway:latest

      - name: Build and push userservice
        uses: docker/build-push-action@v5
        with:
          context: ./userservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-userservice:latest

      - name: Build and push doctorservice
        uses: docker/build-push-action@v5
        with:
          context: ./doctorservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-doctorservice:latest

      - name: Build and push appointmentservice
        uses: docker/build-push-action@v5
        with:
          context: ./appointmentservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-appointmentservice:latest

      - name: Build and push paymentservice
        uses: docker/build-push-action@v5
        with:
          context: ./paymentservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-paymentservice:latest

      - name: Build and push documentservice
        uses: docker/build-push-action@v5
        with:
          context: ./documentservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-documentservice:latest

      - name: Build and push notificationservice
        uses: docker/build-push-action@v5
        with:
          context: ./notificationservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-notificationservice:latest

      - name: Build and push productservice
        uses: docker/build-push-action@v5
        with:
          context: ./productservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-productservice:latest

      - name: Build and push categoryservice
        uses: docker/build-push-action@v5
        with:
          context: ./categoryservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-categoryservice:latest

      - name: Build and push orderservice
        uses: docker/build-push-action@v5
        with:
          context: ./orderservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/delma-orderservice:latest