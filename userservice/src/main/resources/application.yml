server:
  port: 8111


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      doctorservice:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
        slidingWindowType: COUNT_BASED



spring:
  application:
    name: userservice
  datasource:
    url: jdbc:postgresql://localhost:5432/delma_user_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  security:
    user:
      name: admin
      password: admin123

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true    # register this service with Eureka on startup
    fetch-registry: true          # fetch the registry so this service can call others
  instance:
    prefer-ip-address: true       # use IP address instead of hostname

logging:
  level:
    root:  INFO
  file:
    name:  logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-history:7






